name: Automated E-commerce Tests

on:
  push:
    branches: [ "main" ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Lay code ve may ao
      uses: actions/checkout@v4

    - name: Cài dat Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"

    - name: Cài dat Pytest
      run: |
        python -m pip install --upgrade pip
        pip install pytest

    - name: Chay Pytest
      run: |
        pytest test_cart.py -v